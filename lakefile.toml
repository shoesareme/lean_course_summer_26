name = "lean_course_summer_26"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["LeanCourseSummer26"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"

[[require]]
name = "verso-slides"
git = "https://github.com/leanprover/verso-slides.git"
rev = "main"

[[lean_lib]]
name = "LeanCourseSummer26"

[[lean_lib]]
name = "Lecture1Slides"
srcDir = "lecture-notes"
roots = ["Lecture1"]

[[lean_exe]]
name = "lecture1-slides"
srcDir = "lecture-notes"
root = "Main"
